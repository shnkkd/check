<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการข้อมูลคดี (Backend)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .swal2-popup { border-radius: 16px !important; font-family: 'Sarabun', sans-serif !important; }
        /* ซ่อน Scrollbar ของตารางแต่ยังเลื่อนได้ */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <div id="loginSection" class="fixed inset-0 bg-slate-900/95 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-200">
            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-center mb-2">เข้าสู่ระบบหลังบ้าน</h2>
            <p class="text-center text-slate-500 mb-6 text-sm">กรุณากรอกรหัสผ่านเพื่อเข้าถึงข้อมูล</p>
            
            <form onsubmit="event.preventDefault(); checkPass();">
                <input type="password" id="adminPass" placeholder="รหัสผ่านแอดมิน" required
                    class="w-full p-4 border border-slate-300 rounded-xl mb-4 text-center text-lg outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl hover:bg-blue-700 font-bold text-lg shadow-lg shadow-blue-200 transition-all active:scale-95">
                    เข้าสู่ระบบ
                </button>
            </form>
        </div>
    </div>

    <div id="mainDashboard" class="hidden container mx-auto p-4 md:p-8 max-w-7xl">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">ระบบบันทึกข้อมูลคดี</h1>
                <p class="text-slate-500 mt-1">จัดการและตรวจสอบข้อมูลจากฐานข้อมูลโดยตรง</p>
            </div>
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-blue-200 transition-all active:scale-95 w-full md:w-auto justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                </svg>
                <span>เพิ่มข้อมูลใหม่</span>
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-200">
            <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead class="bg-slate-50 text-slate-600 border-b border-slate-200">
                        <tr>
                            <th class="p-4 font-semibold whitespace-nowrap">วันที่ตรวจ</th>
                            <th class="p-4 font-semibold whitespace-nowrap">วันที่รับใบคดี</th>
                            <th class="p-4 font-semibold whitespace-nowrap">ชื่อ - สกุล</th>
                            <th class="p-4 font-semibold whitespace-nowrap">สาเหตุ</th>
                            <th class="p-4 font-semibold whitespace-nowrap">แพทย์ผู้ตรวจ</th>
                            <th class="p-4 font-semibold whitespace-nowrap">ตำรวจเจ้าของเคส</th>
                            <th class="p-4 font-semibold whitespace-nowrap">เลขประจำตัว (cid)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-slate-700 divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
            
            <div id="pagination" class="p-4 bg-slate-50 flex flex-wrap justify-center gap-2 border-t border-slate-200">
                </div>
        </div>
    </div>

    <div id="addModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-40 p-4 backdrop-blur-sm overflow-y-auto">
        <div class="bg-white rounded-3xl p-6 md:p-8 w-full max-w-3xl shadow-2xl my-auto animate__animated animate__fadeInUp animate__faster">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h3 class="text-2xl font-bold text-slate-800">บันทึกข้อมูลคดีใหม่</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <form id="addForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-slate-600 mb-1">วันที่ตรวจ</label>
                    <input type="date" name="dateCheck" required class="border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none transition-all">
                </div>
                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-slate-600 mb-1">วันที่รับใบคดี</label>
                    <input type="date" name="dateReceipt" required class="border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none transition-all">
                </div>
                
                <div class="col-span-full flex flex-col">
                    <label class="text-sm font-semibold text-slate-600 mb-1">ชื่อ - สกุล</label>
                    <input type="text" name="fullname" placeholder="นาย / นาง / นางสาว" required class="border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none transition-all">
                </div>
                
                <div class="col-span-full flex flex-col">
                    <label class="text-sm font-semibold text-slate-600 mb-1">สาเหตุ</label>
                    <input type="text" name="reason" placeholder="ระบุสาเหตุคดี" required class="border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none transition-all">
                </div>

                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-slate-600 mb-1">แพทย์ผู้ตรวจ</label>
                    <input type="text" name="doctor" required class="border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none transition-all">
                </div>
                <div class="flex flex-col">
                    <label class="text-sm font-semibold text-slate-600 mb-1">ตำรวจเจ้าของเคส</label>
                    <input type="text" name="police" required class="border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none transition-all">
                </div>

                <div class="col-span-full flex flex-col">
                    <label class="text-sm font-semibold text-slate-600 mb-1">เลขประจำตัวประชาชน (cid) 13 หลัก</label>
                    <input type="text" name="cid" maxlength="13" placeholder="ระบุตัวเลข 13 หลัก" required 
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                           class="border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-200 focus:border-blue-500 outline-none transition-all text-lg tracking-[0.2em] font-medium">
                </div>
                
                <div class="col-span-full flex gap-3 mt-4 pt-4 border-t">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-xl font-bold hover:bg-slate-200 transition-colors">ยกเลิก</button>
                    <button type="submit" class="flex-[2] bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700 transition-colors shadow-lg shadow-green-200">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // URL ของคุณที่เชื่อมกับ Google Apps Script ตัวใหม่
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwvt5Qfb02W9saIHNfnafi3SmwnfMAY7dC5nn_NZMq0tegcKP4tudp8iK1gCySQxlKT/exec';
        
        let allData = [];
        let currentPage = 1;
        const rowsPerPage = 20;
        let sessionPassword = ''; // ตัวแปรเก็บรหัสผ่านไว้ชั่วคราวตอนล็อกอินผ่าน

        // ฟังก์ชัน 1: ล็อกอิน และโหลดข้อมูล
        async function checkPass() {
            const passInput = document.getElementById('adminPass').value;
            if(!passInput) return;

            Swal.fire({
                title: 'กำลังตรวจสอบข้อมูล...',
                text: 'กรุณารอสักครู่',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            const formData = new FormData();
            formData.append('action', 'getData'); // ส่งคำสั่งไปขอดึงข้อมูล
            formData.append('password', passInput); // ส่งรหัสไปตรวจ

            try {
                const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
                const result = await res.json();

                if (result.status === 'Success') {
                    Swal.close();
                    sessionPassword = passInput; // ถ้ารหัสถูก จำรหัสไว้ใช้ตอนบันทึกข้อมูล
                    allData = result.rows.reverse(); // นำข้อมูลมาเก็บไว้ และสลับให้ข้อมูลล่าสุดขึ้นก่อน (ถ้าต้องการเรียงจากเก่าไปใหม่ ให้เอา .reverse() ออก)
                    
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('mainDashboard').classList.remove('hidden');
                    
                    currentPage = 1; // กลับไปหน้าแรกเสมอตอนโหลดข้อมูลใหม่
                    renderTable();
                } else if (result.status === 'WrongPassword') {
                    Swal.fire('ปฏิเสธการเข้าถึง', 'รหัสผ่านไม่ถูกต้อง!', 'error');
                    document.getElementById('adminPass').value = '';
                } else {
                    Swal.fire('เกิดข้อผิดพลาด', result.status, 'error');
                }
            } catch(e) {
                console.error(e);
                Swal.fire('เชื่อมต่อล้มเหลว', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
            }
        }

        // ฟังก์ชัน 2: วาดตารางข้อมูล
        function renderTable() {
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = allData.slice(start, end);
            
            const tbody = document.getElementById('tableBody');
            
            if (allData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-400">ยังไม่มีข้อมูลในระบบ</td></tr>`;
                renderPagination();
                return;
            }

            tbody.innerHTML = pageData.map(row => `
                <tr class="hover:bg-blue-50/50 transition-colors">
                    <td class="p-4 whitespace-nowrap">${row[0] || '-'}</td>
                    <td class="p-4 whitespace-nowrap">${row[1] || '-'}</td>
                    <td class="p-4">${row[2] || '-'}</td>
                    <td class="p-4">${row[3] || '-'}</td>
                    <td class="p-4">${row[4] || '-'}</td>
                    <td class="p-4">${row[5] || '-'}</td>
                    <td class="p-4 font-mono tracking-wider text-blue-600">${row[6] || '-'}</td>
                </tr>
            `).join('');
            
            renderPagination();
        }

        // ฟังก์ชัน 3: สร้างปุ่มเปลี่ยนหน้า
        function renderPagination() {
            const totalPages = Math.ceil(allData.length / rowsPerPage);
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            
            if(totalPages <= 1) return;

            for(let i = 1; i <= totalPages; i++) {
                const btnClass = currentPage === i 
                    ? 'bg-blue-600 text-white shadow-md' 
                    : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200';
                
                container.innerHTML += `
                    <button onclick="currentPage = ${i}; renderTable(); window.scrollTo(0,0);" 
                            class="px-4 py-2 rounded-xl font-medium transition-all ${btnClass}">
                        ${i}
                    </button>
                `;
            }
        }

        // เปิด-ปิด Modal
        function openModal() { document.getElementById('addModal').classList.replace('hidden', 'flex'); }
        function closeModal() { document.getElementById('addModal').classList.replace('flex', 'hidden'); }

        // ฟังก์ชัน 4: บันทึกข้อมูล
        document.getElementById('addForm').onsubmit = async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            
            // เช็คความยาว CID
            if(formData.get('cid').length !== 13) {
                return Swal.fire('ข้อมูลไม่ถูกต้อง', 'กรุณากรอกเลขประจำตัวให้ครบ 13 หลัก', 'warning');
            }

            formData.append('action', 'addData'); // สั่งให้ Backend รู้ว่านี่คือการเพิ่มข้อมูล
            formData.append('password', sessionPassword); // ส่งรหัสที่แอบจำไว้ ไปยืนยันตัวตน

            Swal.fire({
                title: 'กำลังบันทึกข้อมูล...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
                const result = await res.json();
                
                if(result.status === 'Success') {
                    Swal.fire({
                        icon: 'success',
                        title: 'บันทึกสำเร็จ',
                        text: 'ข้อมูลถูกเพิ่มลงในระบบแล้ว',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    this.reset(); 
                    closeModal(); 
                    
                    // แอบเรียกเช็คข้อมูลใหม่ทั้งหมดแบบเงียบๆ เพื่อให้ตารางอัปเดต
                    const refreshForm = new FormData();
                    refreshForm.append('action', 'getData');
                    refreshForm.append('password', sessionPassword);
                    const refreshRes = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: refreshForm });
                    const refreshResult = await refreshRes.json();
                    
                    if (refreshResult.status === 'Success') {
                        allData = refreshResult.rows.reverse(); // อัปเดตข้อมูล
                        renderTable(); // วาดตารางใหม่
                    }
                } else if (result.status === 'WrongPassword') {
                    Swal.fire('เซสชันหมดอายุ', 'รหัสผ่านไม่ถูกต้อง กรุณาล็อกอินใหม่', 'error').then(() => {
                        window.location.reload();
                    });
                } else {
                    Swal.fire('ผิดพลาด', 'เซิร์ฟเวอร์ตอบกลับ: ' + result.status, 'error');
                }
            } catch(e) {
                console.error(e);
                Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            }
        };
    </script>
</body>
</html>
