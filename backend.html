<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการข้อมูลคดี (Backend)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .swal2-popup { border-radius: 16px !important; font-family: 'Sarabun', sans-serif !important; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginSection" class="fixed inset-0 bg-slate-900/95 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-200">
            <h2 class="text-2xl font-bold text-center mb-6 text-slate-800">เข้าสู่ระบบหลังบ้าน</h2>
            <form onsubmit="event.preventDefault(); checkPass();">
                <input type="password" id="adminPass" placeholder="รหัสผ่านแอดมิน" required
                    class="w-full p-4 border border-slate-300 rounded-xl mb-4 text-center text-lg outline-none focus:border-blue-500 transition-all">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl hover:bg-blue-700 font-bold text-lg">เข้าสู่ระบบ</button>
            </form>
        </div>
    </div>

    <div id="mainDashboard" class="hidden container mx-auto p-4 md:p-8 max-w-[95%]">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">ระบบบันทึกข้อมูลคดี</h1>
                <p class="text-slate-500">จัดการข้อมูลหน้าละ 10 รายการ</p>
            </div>
            <button onclick="openModalForAdd()" class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-all active:scale-95">
                + เพิ่มข้อมูลใหม่
            </button>
        </div>

        <div class="mb-6 relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </div>
            <input type="text" id="searchInput" oninput="handleSearch()" 
                placeholder="ค้นหาด่วนด้วย ชื่อ-สกุล หรือ เลขบัตรประชาชน (CID)..." 
                class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all text-lg">
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-200">
            <div class="overflow-x-auto custom-scrollbar pb-2">
                <table class="w-full text-left border-collapse min-w-[1400px]">
                    <thead class="bg-slate-800 text-white">
                        <tr>
                            <th class="p-3 whitespace-nowrap text-sm">วันที่ตรวจ</th>
                            <th class="p-3 whitespace-nowrap text-sm">วันที่รับเอกสาร</th>
                            <th class="p-3 whitespace-nowrap text-sm">วันที่เสร็จ</th>
                            <th class="p-3 whitespace-nowrap text-sm">วันที่ตำรวจมารับ</th>
                            <th class="p-3 whitespace-nowrap text-sm">ชื่อ - สกุล</th>
                            <th class="p-3 whitespace-nowrap w-1/4 text-sm">สาเหตุ</th>
                            <th class="p-3 whitespace-nowrap text-sm">แพทย์ผู้ตรวจ</th>
                            <th class="p-3 whitespace-nowrap text-sm">ตำรวจเจ้าของเคส</th>
                            <th class="p-3 whitespace-nowrap text-sm">CID</th>
                            <th class="p-3 whitespace-nowrap text-sm text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-slate-700 divide-y divide-slate-100">
                        <tr><td colspan="10" class="p-8 text-center text-slate-400">กำลังโหลดข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="pagination" class="p-4 bg-slate-50 flex flex-wrap justify-center gap-2 border-t border-slate-200"></div>
        </div>
    </div>

    <div id="addModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-40 p-4 backdrop-blur-sm overflow-y-auto">
        <div class="bg-white rounded-3xl p-8 w-full max-w-3xl shadow-2xl my-auto">
            <h3 id="modalTitle" class="text-2xl font-bold text-slate-800 mb-6 border-b pb-4">บันทึกข้อมูลใหม่</h3>
            <form id="dataForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">วันที่ตรวจ</label><input type="date" name="dateCheck" class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">วันที่รับเอกสาร</label><input type="date" name="dateReceipt" class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">วันที่เสร็จ</label><input type="date" name="dateFinish" class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">วันที่ตำรวจมารับใบคดี</label><input type="date" name="datePolice" class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                
                <div class="col-span-full flex flex-col mt-2"><label class="text-sm font-bold text-slate-600 mb-1">ชื่อ - สกุล</label><input type="text" name="fullname" required class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                <div class="col-span-full flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">สาเหตุ</label><input type="text" name="reason" required class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">แพทย์ผู้ตรวจ</label><input type="text" name="doctor" required class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">ตำรวจเจ้าของเคส</label><input type="text" name="police" required class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                <div class="col-span-full flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">เลขบัตรประชาชน (cid) 13 หลัก</label><input type="text" name="cid" maxlength="13" required oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="border p-3 rounded-xl outline-none focus:border-blue-500 text-lg font-mono"></div>
                
                <div class="col-span-full flex gap-3 mt-4 border-t pt-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700">บันทึกข้อมูล</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-xl font-bold hover:bg-slate-200">ยกเลิก</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwvt5Qfb02W9saIHNfnafi3SmwnfMAY7dC5nn_NZMq0tegcKP4tudp8iK1gCySQxlKT/exec';
        let allData = [];
        let filteredData = []; 
        let currentPage = 1;
        const rowsPerPage = 10; 
        let sessionPassword = '';
        
        // ตัวแปรเก็บไว้เช็คว่ากำลัง "เพิ่ม" หรือ "แก้ไข"
        let currentEditRowIndex = null; 

        async function checkPass() {
            const passInput = document.getElementById('adminPass').value;
            if(!passInput) return;
            Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const formData = new FormData();
            formData.append('action', 'getData');
            formData.append('password', passInput);
            try {
                const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
                const result = await res.json();
                if (result.status === 'Success') {
                    Swal.close();
                    sessionPassword = passInput;
                    allData = result.rows.reverse(); // เรียงข้อมูลล่าสุดขึ้นก่อน
                    filteredData = [...allData]; 
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('mainDashboard').classList.remove('hidden');
                    renderTable();
                } else {
                    Swal.fire('ผิดพลาด', 'รหัสผ่านไม่ถูกต้อง หรือสิทธิ์เข้าถึงไม่ถูกต้อง', 'error');
                }
            } catch(e) {
                Swal.fire('เชื่อมต่อล้มเหลว', 'โปรดตรวจการตั้งค่า Apps Script', 'error');
            }
        }

        function handleSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            filteredData = allData.filter(row => {
                const name = String(row[4] || '').toLowerCase(); // ชื่อ-สกุล อยู่ index 4
                const cid = String(row[8] || '').toLowerCase();  // CID อยู่ index 8
                return name.includes(term) || cid.includes(term);
            });
            currentPage = 1; 
            renderTable();
        }

        function renderTable() {
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = filteredData.slice(start, end);
            const tbody = document.getElementById('tableBody');
            
            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="p-8 text-center text-slate-400">ไม่พบข้อมูล</td></tr>`;
            } else {
                tbody.innerHTML = pageData.map((row, index) => {
                    const realIndex = start + index; // เก็บ index ของอาร์เรย์สำหรับการเรียกข้อมูลไปแก้ไข
                    return `
                    <tr class="border-b hover:bg-blue-50/50 transition-colors">
                        <td class="p-3 whitespace-nowrap align-top text-sm">${row[0] || '-'}</td>
                        <td class="p-3 whitespace-nowrap align-top text-sm">${row[1] || '-'}</td>
                        <td class="p-3 whitespace-nowrap align-top text-sm">${row[2] || '-'}</td>
                        <td class="p-3 whitespace-nowrap align-top text-sm">${row[3] || '-'}</td>
                        <td class="p-3 font-semibold whitespace-nowrap align-top text-sm">${row[4] || '-'}</td>
                        <td class="p-3 whitespace-normal break-words min-w-[200px] align-top text-slate-600 leading-relaxed text-sm">${row[5] || '-'}</td>
                        <td class="p-3 whitespace-nowrap align-top text-sm">${row[6] || '-'}</td>
                        <td class="p-3 whitespace-nowrap align-top text-sm">${row[7] || '-'}</td>
                        <td class="p-3 font-mono text-blue-600 whitespace-nowrap align-top text-sm">${row[8] || '-'}</td>
                        <td class="p-3 whitespace-nowrap align-top text-center">
                            <button onclick="openModalForEdit(${realIndex})" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-1.5 rounded-lg text-sm font-bold transition-all shadow-sm">
                                แก้ไข
                            </button>
                        </td>
                    </tr>
                `}).join('');
            }
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            if (totalPages <= 1) return;
            for(let i=1; i<=totalPages; i++) {
                const btnClass = currentPage === i ? 'bg-blue-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100';
                container.innerHTML += `<button onclick="currentPage=${i};renderTable();window.scrollTo(0,0)" class="px-4 py-2 rounded-xl font-bold transition-all ${btnClass}">${i}</button>`;
            }
        }

        // แปลงรูปแบบวันที่ที่ดึงจาก Sheet (DD/MM/YYYY) ให้เป็น YYYY-MM-DD เพื่อแสดงในช่อง input type="date"
        function formatDateForInput(dateStr) {
            if (!dateStr || dateStr === '-') return '';
            if (dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) return dateStr;
            let parts = dateStr.split('/');
            if (parts.length === 3) {
                let year = parseInt(parts[2]);
                if (year > 2500) year -= 543; // แปลง พ.ศ. เป็น ค.ศ. แบบคร่าวๆ
                return `${year}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
            }
            return '';
        }

        function openModalForAdd() { 
            currentEditRowIndex = null; // รีเซ็ตสถานะเป็น "เพิ่มข้อมูลใหม่"
            document.getElementById('modalTitle').innerText = 'บันทึกข้อมูลคดีใหม่';
            document.getElementById('dataForm').reset();
            document.getElementById('addModal').classList.replace('hidden', 'flex'); 
        }

        function openModalForEdit(indexInArray) {
            const rowData = filteredData[indexInArray];
            currentEditRowIndex = rowData[9]; // ดึง Row Index ของ Sheet ที่เราแนบมาใน GAS (คอลัมน์ที่ 10)
            
            document.getElementById('modalTitle').innerText = 'แก้ไขข้อมูลคดี';
            
            // นำข้อมูลเดิมไปใส่ในช่องกรอก
            const form = document.getElementById('dataForm');
            form.dateCheck.value = formatDateForInput(rowData[0]);
            form.dateReceipt.value = formatDateForInput(rowData[1]);
            form.dateFinish.value = formatDateForInput(rowData[2]);
            form.datePolice.value = formatDateForInput(rowData[3]);
            form.fullname.value = rowData[4] || '';
            form.reason.value = rowData[5] || '';
            form.doctor.value = rowData[6] || '';
            form.police.value = rowData[7] || '';
            form.cid.value = rowData[8] || '';

            document.getElementById('addModal').classList.replace('hidden', 'flex'); 
        }

        function closeModal() { document.getElementById('addModal').classList.replace('flex', 'hidden'); }

        document.getElementById('dataForm').onsubmit = async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            
            // เช็คว่าเป็นการแก้ไข หรือ เพิ่มใหม่
            if (currentEditRowIndex) {
                formData.append('action', 'editData');
                formData.append('rowIndex', currentEditRowIndex); // ส่งเลขแถวที่ต้องการแก้ไปให้ Sheet
            } else {
                formData.append('action', 'addData');
            }
            
            formData.append('password', sessionPassword);
            if(formData.get('cid').length !== 13) return Swal.fire('ผิดพลาด', 'CID ต้องครบ 13 หลัก', 'warning');
            
            Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            try {
                const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
                const result = await res.json();
                
                if(result.status === 'Success') {
                    Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success');
                    this.reset(); closeModal();
                    
                    // ดึงข้อมูลตารางมาแสดงผลใหม่
                    const refreshForm = new FormData();
                    refreshForm.append('action', 'getData');
                    refreshForm.append('password', sessionPassword);
                    const refreshRes = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: refreshForm });
                    const refreshResult = await refreshRes.json();
                    
                    if (refreshResult.status === 'Success') {
                        allData = refreshResult.rows.reverse(); 
                        handleSearch(); // รีเฟรชและค้างคำค้นหาเดิมไว้
                    }
                } else {
                    Swal.fire('ผิดพลาด', 'บันทึกไม่สำเร็จ', 'error');
                }
            } catch(e) {
                Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            }
        };
    </script>
</body>
</html>
