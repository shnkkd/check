<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบข้อมูลคดี</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
        .swal2-popup { border-radius: 24px !important; font-family: 'Sarabun', sans-serif !important; }
        /* ซ่อนขอบปุ่มเวลากด */
        button:focus { outline: none !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-[#f0f9ff] via-[#e0f2fe] to-[#bae6fd] min-h-screen flex items-center justify-center p-4">

    <div class="bg-white/80 backdrop-blur-xl border border-white/50 rounded-[2rem] shadow-[0_20px_50px_rgba(30,58,138,0.1)] p-10 max-w-md w-full text-center relative overflow-hidden">
        
        <div class="absolute -top-16 -right-16 w-32 h-32 bg-blue-200 rounded-full blur-3xl opacity-60"></div>
        <div class="absolute -bottom-16 -left-16 w-32 h-32 bg-indigo-200 rounded-full blur-3xl opacity-60"></div>

        <div class="relative w-20 h-20 bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-md border-4 border-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
        
        <h2 class="text-3xl font-semibold text-slate-800 mb-2 relative z-10">ตรวจสอบสถานะคดี</h2>
        <p class="text-slate-500 mb-8 text-base relative z-10">กรุณากรอกรหัส 13 หลักเพื่อค้นหาประวัติทั้งหมด</p>

        <div class="space-y-4 relative z-10">
            <div class="relative">
                <input 
                    type="text" 
                    id="searchInput" 
                    maxlength="13"
                    placeholder="เลขประจำตัว 13 หลัก"
                    class="w-full bg-white border-2 border-blue-50 focus:border-blue-400 focus:ring-4 focus:ring-blue-100 rounded-2xl py-4 px-6 outline-none transition-all text-slate-700 tracking-[0.15em] text-center font-bold placeholder-slate-300 shadow-sm text-lg"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                >
            </div>
            
            <button 
                onclick="searchData()"
                id="searchBtn"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white rounded-2xl py-4 px-6 font-bold shadow-lg shadow-blue-300/50 hover:shadow-blue-400/50 transition-all transform hover:-translate-y-1 active:translate-y-0 flex justify-center items-center gap-2 text-lg"
            >
                <span>ค้นหาสถานะ</span>
            </button>
        </div>
    </div>

    <script>
        const SHEET_ID = '1ZU8SaKnjRnqj4d3WoENjgU5mlrWegwIvlUClXWJkbE0';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        // ตัวแปรส่วนกลางสำหรับเก็บข้อมูลที่เจอทั้งหมด
        let globalFoundRows = [];
        let globalCols = [];
        let globalCidIndex = -1;

        async function searchData() {
            const inputVal = document.getElementById('searchInput').value.trim();
            const btn = document.getElementById('searchBtn');

            if (inputVal.length !== 13) {
                return Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบถ้วน', text: 'กรุณากรอกตัวเลขให้ครบ 13 หลัก', confirmButtonColor: '#3b82f6' });
            }

            btn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังค้นหา...';
            btn.disabled = true;

            try {
                const res = await fetch(URL);
                const text = await res.text();
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonString);

                const cols = data.table.cols.map(c => c ? (c.label || '').trim() : '');
                const rows = data.table.rows;

                const cidIndex = cols.findIndex(c => c.toLowerCase() === 'cid');
                if (cidIndex === -1) {
                    Swal.fire('ตั้งค่าผิดพลาด', 'ไม่พบคอลัมน์ชื่อ CID ในบรรทัดแรกของ Sheet', 'error');
                    return resetButton(btn);
                }

                // ค้นหาทุกแถวที่มี CID ตรงกัน
                let foundRows = [];
                for (let row of rows) {
                    if (row.c && row.c[cidIndex]) {
                        const cellValue = String(row.c[cidIndex].v || '').trim();
                        if (cellValue === inputVal) {
                            foundRows.push(row);
                        }
                    }
                }

                if (foundRows.length > 0) {
                    // เก็บค่าไว้ใช้ข้ามฟังก์ชัน
                    globalFoundRows = foundRows;
                    globalCols = cols;
                    globalCidIndex = cidIndex;
                    
                    showResultList(); // เรียกฟังก์ชันแสดงหน้ารวม
                } else {
                    Swal.fire({ icon: 'error', title: 'ไม่พบข้อมูล', text: `ไม่เจอประวัติเลขประจำตัว ${inputVal}`, confirmButtonColor: '#ef4444' });
                }

            } catch (err) {
                console.error(err);
                Swal.fire('เชื่อมต่อล้มเหลว', 'กรุณาตรวจสอบการตั้งค่า Google Sheet', 'error');
            } finally {
                resetButton(btn);
            }
        }

        // ฟังก์ชัน 1: แสดงรายการประวัติทั้งหมดที่ค้นเจอ (เป็นลิสต์)
        function showResultList() {
            const nameIndex = globalCols.findIndex(c => c === 'ชื่อ - สกุล');
            const dateCheckIndex = globalCols.findIndex(c => c === 'วันที่ตรวจ');
            const docReceiveIndex = globalCols.findIndex(c => c === 'วันที่รับเอกสาร');
            const docFinishIndex = globalCols.findIndex(c => c === 'วันที่เสร็จ');
            const policePickupIndex = globalCols.findIndex(c => c === 'วันที่ตำรวจมารับใบคดี');

            let htmlContent = `<div class="mt-2 text-left space-y-3 max-h-[60vh] overflow-y-auto px-1 pb-2">`;
            
            // แสดงจำนวนคดีที่เจอ
            htmlContent += `<p class="text-sm font-semibold text-slate-500 text-center mb-4">พบประวัติทั้งหมด ${globalFoundRows.length} รายการ</p>`;

            globalFoundRows.forEach((row, index) => {
                const fullName = (row.c[nameIndex] && row.c[nameIndex].v) ? row.c[nameIndex].v : 'ไม่ระบุชื่อ';
                
                // ดึงวันที่ตรวจ
                const checkDateObj = row.c[dateCheckIndex];
                const checkDate = (checkDateObj && checkDateObj.f) ? checkDateObj.f : (checkDateObj && checkDateObj.v) ? checkDateObj.v : 'ไม่ระบุวันที่ตรวจ';

                // คำนวณสถานะ
                let statusText = 'รอดำเนินการ';
                let statusColor = 'text-slate-600 bg-slate-100 border-slate-200';

                if (policePickupIndex !== -1 && row.c[policePickupIndex] && row.c[policePickupIndex].v) {
                    statusText = 'ตำรวจมารับใบคดีแล้ว';
                    statusColor = 'text-green-700 bg-green-50 border-green-200';
                } else if (docFinishIndex !== -1 && row.c[docFinishIndex] && row.c[docFinishIndex].v) {
                    statusText = 'เอกสารเสร็จเรียบร้อย';
                    statusColor = 'text-blue-700 bg-blue-50 border-blue-200';
                } else if (docReceiveIndex !== -1 && row.c[docReceiveIndex] && row.c[docReceiveIndex].v) {
                    statusText = 'รับเอกสารแล้ว';
                    statusColor = 'text-amber-700 bg-amber-50 border-amber-200';
                }

                // สร้างการ์ดแต่ละใบ (กดได้)
                htmlContent += `
                    <div onclick="showFullDetails(${index})" class="bg-white p-5 rounded-2xl border-2 border-slate-100 shadow-sm hover:border-blue-300 hover:bg-blue-50/30 cursor-pointer transition-all transform active:scale-[0.98]">
                        <div class="flex flex-col mb-3">
                            <span class="self-start text-[0.8rem] font-bold text-blue-600 bg-blue-100 px-3 py-1 rounded-full mb-2 tracking-wide">
                                📅 วันที่ตรวจ: ${checkDate}
                            </span>
                            <span class="text-lg font-bold text-slate-800">${fullName}</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-[0.7rem] font-semibold text-slate-400 mb-1">สถานะล่าสุด</p>
                                <div class="inline-block px-3 py-1 rounded-xl border text-sm font-semibold ${statusColor}">
                                    ${statusText}
                                </div>
                            </div>
                            <span class="text-blue-500 font-bold text-sm bg-white border border-blue-100 px-3 py-1.5 rounded-xl">ดูข้อมูล &rarr;</span>
                        </div>
                    </div>
                `;
            });
            htmlContent += `</div>`;

            Swal.fire({
                title: 'ผลการค้นหา',
                html: htmlContent,
                showConfirmButton: true,
                confirmButtonText: 'ปิดหน้าต่าง',
                confirmButtonColor: '#cbd5e1',
                width: '500px'
            });
        }

        // ฟังก์ชัน 2: แสดงรายละเอียดแบบเจาะจง (เมื่อกดเข้าการ์ด)
        function showFullDetails(rowIndex) {
            const targetRow = globalFoundRows[rowIndex];
            let htmlContent = '<div class="text-left space-y-3 mt-4 max-h-[60vh] overflow-y-auto px-2 pb-2">';
            
            globalCols.forEach((colLabel, idx) => {
                // ข้ามคอลัมน์ CID และคอลัมน์ที่ไม่มีชื่อหัวข้อ
                if (idx !== globalCidIndex && colLabel) {
                    const cellObj = targetRow.c[idx];
                    const value = (cellObj !== null && cellObj !== undefined && cellObj.v !== null) ? cellObj.v : '-';
                    const displayValue = cellObj && cellObj.f ? cellObj.f : value; 

                    htmlContent += `
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex flex-col">
                            <span class="text-[0.85rem] font-semibold text-blue-600 mb-1 tracking-wide">${colLabel}</span>
                            <span class="text-slate-800 text-lg">${displayValue}</span>
                        </div>
                    `;
                }
            });
            htmlContent += '</div>';

            Swal.fire({
                title: 'รายละเอียดคดี',
                html: htmlContent,
                width: '600px',
                showCancelButton: true,
                confirmButtonColor: '#cbd5e1',
                cancelButtonColor: '#3b82f6',
                confirmButtonText: 'ปิดหน้าต่าง',
                cancelButtonText: 'ย้อนกลับไปหน้ารวม',
                reverseButtons: true,
                showClass: { popup: 'animate__animated animate__fadeInRight animate__faster' },
                hideClass: { popup: 'animate__animated animate__fadeOutRight animate__faster' }
            }).then((result) => {
                // ถ้ากดปุ่ม 'ย้อนกลับไปหน้ารวม' (ซึ่งคือปุ่ม Cancel ในเชิงเทคนิค) ให้แสดงหน้ารวมใหม่
                if (result.dismiss === Swal.DismissReason.cancel) {
                    showResultList();
                }
            });
        }

        function resetButton(btn) {
            btn.disabled = false;
            btn.innerHTML = '<span>ค้นหาสถานะ</span>';
        }
    </script>
</body>
</html>
