<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลคดี</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen">

    <div id="loginSection" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
            <h2 class="text-2xl font-bold text-slate-800 mb-4 text-center">เข้าสู่ระบบ</h2>
            <input type="password" id="adminPass" placeholder="รหัสผ่านแอดมิน" class="w-full p-3 border rounded-xl mb-4 text-center">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 font-bold">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="mainDashboard" class="hidden container mx-auto p-4 md:p-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-3xl font-bold text-slate-800">ระบบจัดการข้อมูลคดี</h1>
            <button onclick="openModal()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2">
                <span>+ เพิ่มข้อมูลใหม่</span>
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800 text-white">
                        <tr>
                            <th class="p-4">วันที่ตรวจ</th>
                            <th class="p-4">วันที่รับใบคดี</th>
                            <th class="p-4">ชื่อ - สกุล</th>
                            <th class="p-4">สาเหตุ</th>
                            <th class="p-4">แพทย์</th>
                            <th class="p-4">ตำรวจ</th>
                            <th class="p-4">cid</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-slate-700">
                        </tbody>
                </table>
            </div>
            <div id="pagination" class="p-4 bg-slate-50 flex justify-center gap-2"></div>
        </div>
    </div>

    <div id="addModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-40 p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-2xl shadow-2xl">
            <h3 class="text-2xl font-bold mb-6">บันทึกข้อมูลใหม่</h3>
            <form id="addForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">วันที่ตรวจ</label><input type="date" name="dateCheck" required class="border p-2 rounded-lg"></div>
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">วันที่รับใบคดี</label><input type="date" name="dateReceipt" required class="border p-2 rounded-lg"></div>
                <div class="col-span-full flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">ชื่อ - สกุล</label><input type="text" name="fullname" required class="border p-2 rounded-lg"></div>
                <div class="col-span-full flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">สาเหตุ</label><input type="text" name="reason" required class="border p-2 rounded-lg"></div>
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">แพทย์ผู้ตรวจ</label><input type="text" name="doctor" required class="border p-2 rounded-lg"></div>
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">ตำรวจเจ้าของเคส</label><input type="text" name="police" required class="border p-2 rounded-lg"></div>
                <div class="col-span-full flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">เลขบัตรประชาชน (cid) 13 หลัก</label><input type="text" name="cid" maxlength="13" required class="border p-2 rounded-lg"></div>
                
                <div class="col-span-full flex gap-3 mt-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">บันทึก</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-slate-200 text-slate-700 py-3 rounded-xl font-bold">ยกเลิก</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzmBHpu2eqKcyi4Ai4FYyf15ZVmQ-bntLl_RltABm-YQ_MRwVt8DcECqACj_sBgK7w/exec';
        let allData = [];
        let currentPage = 1;
        const rowsPerPage = 20;

        function checkPass() {
            if(document.getElementById('adminPass').value === '1234') {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                loadData();
            } else {
                Swal.fire('ผิดพลาด', 'รหัสผ่านไม่ถูกต้อง', 'error');
            }
        }

        async function loadData() {
            const res = await fetch(APPS_SCRIPT_URL);
            const data = await res.json();
            allData = data.rows;
            renderTable();
        }

        function renderTable() {
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = allData.slice(start, end);

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = pageData.map(row => `
                <tr class="border-b hover:bg-slate-50">
                    ${row.map(cell => `<td class="p-4">${cell}</td>`).join('')}
                </tr>
            `).join('');
            
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(allData.length / rowsPerPage);
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            for(let i=1; i<=totalPages; i++) {
                container.innerHTML += `<button onclick="currentPage=${i};renderTable()" class="px-4 py-2 rounded-lg ${currentPage===i ? 'bg-blue-600 text-white' : 'bg-white border text-slate-600'}">${i}</button>`;
            }
        }

        function openModal() { document.getElementById('addModal').classList.replace('hidden', 'flex'); }
        function closeModal() { document.getElementById('addModal').classList.replace('flex', 'hidden'); }

        document.getElementById('addForm').onsubmit = async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            formData.append('adminPassword', '1234'); // ส่งรหัสผ่านไปตรวจสอบที่หลังบ้านด้วย

            if(formData.get('cid').length !== 13) return Swal.fire('ผิดพลาด', 'CID ต้องครบ 13 หลัก', 'warning');

            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
                const result = await res.text();
                if(result === 'Success') {
                    Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success');
                    this.reset(); closeModal(); loadData();
                } else {
                    Swal.fire('ผิดพลาด', 'บันทึกไม่สำเร็จ: ' + result, 'error');
                }
            } catch(e) {
                Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            }
        };
    </script>
</body>
</html>
