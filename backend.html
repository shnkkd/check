<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการข้อมูลคดี (Backend)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .swal2-popup { border-radius: 16px !important; font-family: 'Sarabun', sans-serif !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginSection" class="fixed inset-0 bg-slate-900/95 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-200">
            <h2 class="text-2xl font-bold text-center mb-6">เข้าสู่ระบบ</h2>
            <form onsubmit="event.preventDefault(); checkPass();">
                <input type="password" id="adminPass" placeholder="รหัสผ่านแอดมิน" required
                    class="w-full p-4 border border-slate-300 rounded-xl mb-4 text-center text-lg outline-none focus:border-blue-500 transition-all">
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl hover:bg-blue-700 font-bold text-lg">เข้าสู่ระบบ</button>
            </form>
        </div>
    </div>

    <div id="mainDashboard" class="hidden container mx-auto p-4 md:p-8 max-w-7xl">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">ระบบบันทึกข้อมูลคดี</h1>
                <p class="text-slate-500">จัดการข้อมูลหน้าละ 10 รายการ</p>
            </div>
            <button onclick="openModal()" class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition-all active:scale-95">
                + เพิ่มข้อมูลใหม่
            </button>
        </div>

        <div class="mb-6 relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <input type="text" id="searchInput" oninput="handleSearch()" 
                placeholder="ค้นหาด่วนด้วย ชื่อ-สกุล หรือ เลขบัตรประชาชน (CID)..." 
                class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all text-lg">
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-200">
            <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead class="bg-slate-800 text-white">
                        <tr>
                            <th class="p-4">วันที่ตรวจ</th>
                            <th class="p-4">วันที่รับใบคดี</th>
                            <th class="p-4">ชื่อ - สกุล</th>
                            <th class="p-4">สาเหตุ</th>
                            <th class="p-4">แพทย์ผู้ตรวจ</th>
                            <th class="p-4">ตำรวจเจ้าของเคส</th>
                            <th class="p-4">cid</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-slate-700 divide-y divide-slate-100">
                        <tr><td colspan="7" class="p-8 text-center text-slate-400">กำลังโหลดข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="pagination" class="p-4 bg-slate-50 flex flex-wrap justify-center gap-2 border-t border-slate-200"></div>
        </div>
    </div>

    <div id="addModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-40 p-4 backdrop-blur-sm overflow-y-auto">
        <div class="bg-white rounded-3xl p-8 w-full max-w-2xl shadow-2xl my-auto">
            <h3 class="text-2xl font-bold text-slate-800 mb-6 border-b pb-4">บันทึกข้อมูลใหม่</h3>
            <form id="addForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">วันที่ตรวจ</label><input type="date" name="dateCheck" required class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">วันที่รับใบคดี</label><input type="date" name="dateReceipt" required class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                <div class="col-span-full flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">ชื่อ - สกุล</label><input type="text" name="fullname" required class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                <div class="col-span-full flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">สาเหตุ</label><input type="text" name="reason" required class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">แพทย์ผู้ตรวจ</label><input type="text" name="doctor" required class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                <div class="flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">ตำรวจเจ้าของเคส</label><input type="text" name="police" required class="border p-3 rounded-xl outline-none focus:border-blue-500"></div>
                <div class="col-span-full flex flex-col"><label class="text-sm font-bold text-slate-600 mb-1">เลขบัตรประชาชน (cid) 13 หลัก</label><input type="text" name="cid" maxlength="13" required oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="border p-3 rounded-xl outline-none focus:border-blue-500 text-lg font-mono"></div>
                <div class="col-span-full flex gap-3 mt-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700">บันทึกข้อมูล</button>
                    <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-xl font-bold hover:bg-slate-200">ยกเลิก</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwvt5Qfb02W9saIHNfnafi3SmwnfMAY7dC5nn_NZMq0tegcKP4tudp8iK1gCySQxlKT/exec';
        let allData = [];
        let filteredData = []; // สำหรับเก็บข้อมูลที่ผ่านการกรองค้นหา
        let currentPage = 1;
        const rowsPerPage = 10; // ลดเหลือ 10 แถว
        let sessionPassword = '';

        async function checkPass() {
            const passInput = document.getElementById('adminPass').value;
            if(!passInput) return;
            Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const formData = new FormData();
            formData.append('action', 'getData');
            formData.append('password', passInput);
            try {
                const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
                const result = await res.json();
                if (result.status === 'Success') {
                    Swal.close();
                    sessionPassword = passInput;
                    allData = result.rows.reverse();
                    filteredData = [...allData]; // เริ่มต้นให้ข้อมูลกรองเท่ากับข้อมูลทั้งหมด
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('mainDashboard').classList.remove('hidden');
                    renderTable();
                } else {
                    Swal.fire('ผิดพลาด', 'รหัสผ่านไม่ถูกต้อง หรือสิทธิ์เข้าถึงไม่ถูกต้อง', 'error');
                }
            } catch(e) {
                Swal.fire('เชื่อมต่อล้มเหลว', 'โปรดตรวจการตั้งค่า Apps Script (ต้องเป็น Anyone)', 'error');
            }
        }

        // ระบบค้นหา Real-time
        function handleSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            filteredData = allData.filter(row => {
                const name = String(row[2]).toLowerCase(); // คอลัมน์ ชื่อ-สกุล
                const cid = String(row[6]).toLowerCase();  // คอลัมน์ CID
                return name.includes(term) || cid.includes(term);
            });
            currentPage = 1; // รีเซ็ตไปหน้าแรกเมื่อค้นหา
            renderTable();
        }

        function renderTable() {
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = filteredData.slice(start, end);
            const tbody = document.getElementById('tableBody');
            
            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-400">ไม่พบข้อมูลที่ค้นหา</td></tr>`;
            } else {
                tbody.innerHTML = pageData.map(row => `
                    <tr class="border-b hover:bg-blue-50/50 transition-colors">
                        <td class="p-4">${row[0] || '-'}</td>
                        <td class="p-4">${row[1] || '-'}</td>
                        <td class="p-4 font-semibold">${row[2] || '-'}</td>
                        <td class="p-4">${row[3] || '-'}</td>
                        <td class="p-4">${row[4] || '-'}</td>
                        <td class="p-4">${row[5] || '-'}</td>
                        <td class="p-4 font-mono text-blue-600">${row[6] || '-'}</td>
                    </tr>
                `).join('');
            }
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            if (totalPages <= 1) return;
            for(let i=1; i<=totalPages; i++) {
                const btnClass = currentPage === i ? 'bg-blue-600 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100';
                container.innerHTML += `<button onclick="currentPage=${i};renderTable();window.scrollTo(0,0)" class="px-4 py-2 rounded-xl font-bold transition-all ${btnClass}">${i}</button>`;
            }
        }

        function openModal() { document.getElementById('addModal').classList.replace('hidden', 'flex'); }
        function closeModal() { document.getElementById('addModal').classList.replace('flex', 'hidden'); }

        document.getElementById('addForm').onsubmit = async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            formData.append('action', 'addData');
            formData.append('password', sessionPassword);
            if(formData.get('cid').length !== 13) return Swal.fire('ผิดพลาด', 'CID ต้องครบ 13 หลัก', 'warning');
            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: formData });
                const result = await res.json();
                if(result.status === 'Success') {
                    Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success');
                    this.reset(); closeModal();
                    checkPass(); // โหลดข้อมูลใหม่
                } else {
                    Swal.fire('ผิดพลาด', 'บันทึกไม่สำเร็จ หรือรหัสผ่านผิด', 'error');
                }
            } catch(e) {
                Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            }
        };
    </script>
</body>
</html>
